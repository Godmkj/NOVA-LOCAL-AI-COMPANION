name: nova_companion_os
description: A futuristic local AI companion desktop operating layer.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.3.6
  window_manager: ^0.3.5
  flutter_acrylic: ^1.1.3      # For glassmorphism, blur, and transparency windows
  web_socket_channel: ^2.4.0   # Connection to Python daemon
  rive: ^0.11.12               # Futuristic fluid orb animations
  google_fonts: ^5.1.0
  lucide_icons: ^0.320.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/rive/
